<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sanjuan Music</title>

<style>

body{
    margin:0;
    padding:0;
    background:#f5e6c8;
    font-family: Georgia, serif;
    color:#4a2c2a;
}

.contenedor{
    max-width:1000px;
    margin:40px auto;
    padding:30px;
}

.tarjeta{
    background:#fffaf0;
    border:8px solid #8b0000;
    border-radius:25px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 35px rgba(0,0,0,0.25);
}

.logo{
    font-size:70px;
    margin-bottom:10px;
}

h1{
    margin:0;
    color:#8b0000;
    font-size:48px;
}

.eslogan{
    font-size:22px;
    color:#8b5a2b;
    margin-bottom:30px;
}

.linea{
    width:80%;
    margin:25px auto;
    border-top:2px solid #d4af37;
}

p{
    font-size:18px;
}

input{
    width:90%;
    padding:20px;
    margin:10px 0;
    border:2px solid #d4af37;
    border-radius:12px;
    font-size:20px;
}

button{
    background:#8b0000;
    color:white;
    border:none;
    padding:18px 40px;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    background:#6b0000;
}

.frase{
    margin-top:30px;
    font-style:italic;
    color:#8b5a2b;
}

</style>
</head>

<body>

<div class="contenedor">

<div class="tarjeta">

<div class="logo">🎧</div>

<h1>Sanjuan Music</h1>

<div class="eslogan">
Nuestra música
</div>

<div class="linea"></div>

<p>Bienvenido.</p>

<p>Comparte la canción que te gustaría escuchar.</p>

<div style="margin:25px 0;">

<a href="https://open.spotify.com/socialsession/1G3nslrlCZLjGF4Iz7Ey6h?si=FgMF8CBcT9qaTTk6WA9WZA"
target="_blank">

<button style="
background:#1DB954;
margin-bottom:15px;
">
🎶 Unirme a la sesión musical
</button>

</a>

<p style="font-size:14px;">
Si tienes Spotify, puedes agregar canciones directamente a la reproducción.
</p>

</div>

<input type="text" id="nombre" placeholder="Tu nombre">

<input type="text" id="cancion" placeholder="Canción o artista">

<br><br>

<button id="btnSolicitar" onclick="enviarCancion()">
Solicitar canción
</button>

<p id="mensaje"></p>

<div class="linea"></div>

<h2>🎶 Ahora sonando</h2>

<div id="ahoraSonando" style="
padding:25px;
background:#8b0000;
box-shadow:0 0 20px rgba(139,0,0,0.4);
border:2px solid #d4af37;
border-radius:20px;
margin-bottom:20px;
font-size:32px;
font-weight:bold;
color:white;
text-align:center;
">
">
Cargando...
</div>

<h2>🎼 Últimas solicitudes</h2>

<div id="ultimasCanciones">
Cargando...
</div>

<div class="frase">
"La música une los momentos que más recordamos"
</div>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxawiZ0NXjvSnzp-94qh29Rn2cEqZigbXmdGGopy95_wpUbhyUkmQeHLOydRVWAQOsnBA/exec";

async function enviarCancion(){

    const nombre = document.getElementById("nombre").value;
    const cancion = document.getElementById("cancion").value;

    if(!nombre || !cancion){
        alert("Por favor completa todos los campos");
        return;
    }

    try{

        await fetch(API_URL,{
            method:"POST",
            body:JSON.stringify({
                nombre:nombre,
                cancion:cancion
            })
        });

        document.getElementById("mensaje").innerHTML = `
        <div style="
        margin-top:20px;
        padding:20px;
        background:#fffaf0;
        border:2px solid #d4af37;
        border-radius:15px;
        color:#4a2c2a;
        ">
        <h3>🎵 ¡Gracias!</h3>

        <p>Tu canción ha sido agregada a Sanjuan Music.</p>

        <p>🎶 Que suene la música 🎶</p>
        </div>
        `;

        document.getElementById("nombre").value="";
        document.getElementById("cancion").value="";

    }

    catch(error){

        document.getElementById("mensaje").innerHTML =
        "❌ Error al enviar";

    }

}

async function cargarCanciones(){

    try{

        const respuesta = await fetch("https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnR93Z4dSQNFa0JBWUwVxPBduxu_xbRRcfAQoZAG2U6zd10KTEAlFKz5G6eDJ00AkNO9UjQYwuuEoga64FDAiTd8zEocskCI4tGwgJaR0f1ewZFTZzTULkn7_SNrDdvxvKIIiGwkMtacaTMThyTAAaxBOzYPgyWia_fqucfkS1ZvQW0w6Fp0Fk8Y8_eoywaEXA5_M_R3PGeISkvpAgtlThKkAmPY2ITakr0EJgktP0SytCv_pTMvEmcCmfTqa57GpLNLgh34IcY9Y_kBQOn24JeTHrmKbQ&lib=MeoeOA9sFcxCwEvxxxt1tplGR1CdH2fRn"
);
        const datos = await respuesta.json();

        document.getElementById("ahoraSonando").innerHTML =
        datos.ahoraSonando || "Sin canción seleccionada";

        const canciones = datos.canciones || [];

        let html = "";

        canciones.forEach(item => {

            html += `
            <div style="
            margin:12px 0;
            padding:15px;
            background:#fffaf0;
            border-radius:12px;
            border:1px solid #d4af37;
            ">
          🎶 <strong style="
font-size:24px;
color:#4a2c2a;
">
${item.cancion}
</strong>
            <br>
            <span style="
font-size:18px;
color:#8b5a2b;
">
${item.nombre}
</span>
            </div>
            `;
        });

        document.getElementById("ultimasCanciones").innerHTML = html;

    }

    catch(error){

        document.getElementById("ultimasCanciones").innerHTML =
        "Error cargando solicitudes";

        console.error(error);

    }

}

cargarCanciones();

setInterval(cargarCanciones,30000);

</script>

</body>
</html>
