<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanjuan Music</title>

<style>

body{
    margin:0;
    font-family: Georgia, serif;
    background:#f5ecd9;
    color:#4a2c2a;
    text-align:center;
}

.container{
    max-width:700px;
    margin:auto;
    padding:40px;
}

h1{
    font-size:60px;
    margin-bottom:10px;
}

h2{
    font-weight:normal;
    color:#8b0000;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.1);
    margin-top:30px;
}

input{
    width:90%;
    padding:12px;
    margin:10px;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    background:#8b0000;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#6d0000;
}

</style>

</head>

<body>

<div class="container">

<h1>🎵</h1>

<h1>Sanjuan Music</h1>

<h2>Nuestra música</h2>

<div class="card">

<h3>Bienvenido</h3>

<p>Solicita tu canción favorita para nuestra reunión.</p>

<input type="text" placeholder="Tu nombre">

<input type="text" placeholder="Canción o artista">

<br><br>

<button>Solicitar canción</button>

</div>

</div>

</body>
</html>
