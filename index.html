<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sanjuan Music</title>

<style>

body{
    margin:0;
    padding:0;
    background:#f5e6c8;
    font-family: Georgia, serif;
    color:#4a2c2a;
}

.contenedor{
    max-width:700px;
    margin:40px auto;
    padding:30px;
}

.tarjeta{
    background:#fffaf0;
    border:8px solid #8b0000;
    border-radius:25px;
    padding:40px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.2);
}

.logo{
    font-size:70px;
    margin-bottom:10px;
}

h1{
    margin:0;
    color:#8b0000;
    font-size:48px;
}

.eslogan{
    font-size:22px;
    color:#8b5a2b;
    margin-bottom:30px;
}

.linea{
    width:80%;
    margin:25px auto;
    border-top:2px solid #d4af37;
}

p{
    font-size:18px;
}

input{
    width:90%;
    padding:15px;
    margin:10px 0;
    border:2px solid #d4af37;
    border-radius:12px;
    font-size:16px;
}

button{
    background:#8b0000;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#6b0000;
}

.frase{
    margin-top:30px;
    font-style:italic;
    color:#8b5a2b;
}

</style>

</head>

<body>

<div class="contenedor">

<div class="tarjeta">

<div class="logo">🎵</div>

<h1>Sanjuan Music</h1>

<div class="eslogan">
Nuestra música
</div>

<div class="linea"></div>

<p>
Bienvenido.
</p>

<p>
Comparte la canción que te gustaría escuchar durante nuestra reunión.
</p>

<input type="text" placeholder="Tu nombre">

<input type="text" placeholder="Canción o artista">

<br><br>

<button>Solicitar canción</button>

<div class="linea"></div>

<div class="frase">
"La música une los momentos que más recordamos"
</div>

</div>

</div>

</body>
</html>
